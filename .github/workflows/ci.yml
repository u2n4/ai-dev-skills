name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install check-jsonschema
        run: uv tool install check-jsonschema

      - name: Validate JSON files (syntax)
        run: |
          set -e
          for f in $(find . -name "*.json" -not -path "./node_modules/*"); do
            echo "validating $f"
            python -c "import json,sys; json.load(open('$f',encoding='utf-8'))"
          done

      - name: Validate marketplace.json + plugin.json structure
        run: |
          # Structural sanity checks. Swap in a real schema URL once one is published.
          for f in $(find . -name "plugin.json"); do
            python -c "
          import json, sys
          d = json.load(open('$f', encoding='utf-8'))
          assert 'name' in d and 'version' in d, 'missing required keys in $f'
          print('ok', '$f')
          "
          done
          python -c "
          import json
          d = json.load(open('.claude-plugin/marketplace.json', encoding='utf-8'))
          assert isinstance(d.get('plugins'), list) and len(d['plugins']) > 0, 'marketplace has no plugins'
          print('ok marketplace.json with', len(d['plugins']), 'plugins')
          "
